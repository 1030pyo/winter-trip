<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>눈길원정대 · SNOW QUEST</title>
<style>
/* ============ FONT ============ */
@font-face{
  font-family:'Stardust';
  src:url('./Font/PF스타더스트 3.0.ttf') format('truetype');
  font-weight:400; font-display:swap;
}
@font-face{
  font-family:'Stardust';
  src:url('./Font/PF스타더스트 3.0 Bold.ttf') format('truetype');
  font-weight:700; font-display:swap;
}
@font-face{
  font-family:'Stardust';
  src:url('./Font/PF스타더스트 3.0 ExtraBold.ttf') format('truetype');
  font-weight:800; font-display:swap;
}

/* ============ PALETTE (Chroma Noir) ============ */
:root{
  --black:#0d0d0d; --g1:#383838; --g2:#4f4f4f; --g3:#828282; --g4:#b5b5b5; --white:#d9d9d9; --pure:#fff;
  --ice-d:#306173; --ice-m:#3f819a; --ice:#4dcced;
  --water-dd:#2a455a; --water-d:#306082; --water:#639bff;
  --purple-d:#651e6f; --purple:#cc49e9;
  --pink-d:#9a2e8a; --pink:#f873e4;
  --red-d:#903122; --red:#e64e35; --red-l:#fb684f;
  --orange-d:#b04b05; --orange:#ed7929;
  --brown-d:#60361d; --brown:#a86437; --tan:#d77c40;
  --gold-d:#a9832a; --gold:#fbca43;
  --green-d:#328c25; --green:#5de34a; --grass:#a8e550;
  --panel:#10171d; --panel-2:#0a0f14; --line:#2a455a;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:'Stardust',monospace;
  background:var(--black);
  color:var(--white);
  overflow:hidden;
  -webkit-font-smoothing:none;
  letter-spacing:.3px;
  cursor:default;
  user-select:none;
}
img{image-rendering:pixelated;image-rendering:crisp-edges;display:block;}
.spr{image-rendering:pixelated;}

/* ============ APP SHELL ============ */
#app{position:fixed;inset:0;}
#snow{position:fixed;inset:0;z-index:60;pointer-events:none;}

.screen{
  position:absolute;inset:0;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px;
  opacity:0;transform:translateY(18px);
  transition:opacity .5s ease, transform .5s ease;
  z-index:10;
}
.screen.active{display:flex;}
.screen.shown{opacity:1;transform:translateY(0);}

/* ============ SCROLLBAR ============ */
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:var(--panel-2);}
::-webkit-scrollbar-thumb{background:var(--ice-d);border:2px solid var(--panel-2);}
::-webkit-scrollbar-thumb:hover{background:var(--ice-m);}

/* ============ PIXEL PANEL / BUTTON ============ */
.panel{
  background:var(--panel);
  border:3px solid var(--ice-d);
  box-shadow:
    0 0 0 3px var(--black),
    inset 0 0 0 1px rgba(77,204,237,.18),
    0 0 22px rgba(13,13,13,.9);
  position:relative;
}
.panel::before{
  content:"";position:absolute;top:-3px;left:-3px;width:9px;height:9px;
  background:var(--ice);box-shadow:0 0 0 3px var(--black);
}
.panel::after{
  content:"";position:absolute;bottom:-3px;right:-3px;width:9px;height:9px;
  background:var(--ice);box-shadow:0 0 0 3px var(--black);
}

.btn{
  font-family:'Stardust',monospace;font-weight:800;font-size:18px;
  color:var(--black);background:var(--ice);
  border:none;padding:14px 26px;
  box-shadow:0 5px 0 var(--ice-d), 0 5px 0 3px var(--black);
  cursor:pointer;transition:transform .08s, box-shadow .08s, background .15s;
  text-transform:uppercase;letter-spacing:1px;position:relative;
}
.btn:hover{background:var(--pure);transform:translateY(-2px);}
.btn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--ice-d),0 1px 0 3px var(--black);}
.btn.ghost{background:var(--panel);color:var(--ice);box-shadow:0 5px 0 var(--line),0 5px 0 3px var(--black);}
.btn.ghost:hover{background:var(--water-dd);color:var(--pure);}
.btn.gold{background:var(--gold);box-shadow:0 5px 0 var(--gold-d),0 5px 0 3px var(--black);}
.btn.gold:hover{background:#ffe07a;}
.btn:disabled{opacity:.35;cursor:not-allowed;filter:grayscale(.6);}
.btn:disabled:hover{transform:none;background:var(--ice);}

/* ============ TITLE SCREEN SCENE ============ */
#scene{position:absolute;inset:0;z-index:1;overflow:hidden;background:#0d0d0d;}
/* layers that hold the 1.gif elements spread across the whole screen (filled by JS) */
#sky{position:absolute;inset:0;z-index:1;}
#land{position:absolute;inset:0;z-index:3;}
#sky img,#land img{image-rendering:pixelated;}
.parallax{position:absolute;inset:0;will-change:transform;}

.stars{position:absolute;inset:0;}
.star{position:absolute;width:2px;height:2px;background:var(--white);animation:twinkle 3s steps(2) infinite;}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:1}}

.aurora{position:absolute;top:-5%;left:-10%;width:120%;height:55%;opacity:.5;mix-blend-mode:screen;
  background:
    radial-gradient(120% 60% at 30% 0%, rgba(93,227,74,.0) 40%, rgba(77,204,237,.28) 60%, rgba(93,227,74,.22) 75%, rgba(13,13,13,0) 90%);
  animation:aur 9s ease-in-out infinite alternate;}
.aurora.b{opacity:.4;background:radial-gradient(130% 55% at 65% 0%, rgba(204,73,233,.0) 45%, rgba(99,155,255,.22) 65%, rgba(93,227,74,.18) 82%, rgba(13,13,13,0) 92%);animation-duration:12s;}
@keyframes aur{0%{transform:translateX(-3%) skewX(-4deg);opacity:.35}100%{transform:translateX(4%) skewX(4deg);opacity:.6}}

.moon{position:absolute;top:9%;right:14%;width:54px;height:54px;border-radius:50%;
  background:radial-gradient(circle at 38% 38%, #f2f8ff 0 46%, #b5c9d6 47% 70%, #6e8a9a 71% 100%);
  box-shadow:0 0 0 4px rgba(77,204,237,.12),0 0 30px 6px rgba(77,204,237,.22);
  image-rendering:pixelated;}
.moon::after{content:"";position:absolute;top:-10%;right:-14%;width:46px;height:46px;border-radius:50%;background:#0b1016;}

.cloud{position:absolute;image-rendering:pixelated;opacity:.65;animation:drift 60s linear infinite;}
@keyframes drift{from{transform:translateX(-20vw)}to{transform:translateX(120vw)}}

.ridge{position:absolute;left:0;width:100%;display:flex;align-items:flex-end;justify-content:center;gap:2px;}
.ridge img{height:100%;width:auto;opacity:.9;}

/* generated snowfield: 1.gif's own ice strip tiled across the full width; height/scale set in JS */
.ground{position:absolute;left:0;bottom:0;width:100%;z-index:2;
  background:#0d0d0d url('./Asset/ground_tile.png') repeat-x top left;
  image-rendering:pixelated;}

.ftree{position:absolute;bottom:13%;transform:translateX(-50%);image-rendering:pixelated;opacity:.96;}
.cabin-wrap{position:absolute;bottom:13.1%;left:50%;transform:translateX(-50%);}
.cabin-wrap img{height:104px;width:auto;filter:drop-shadow(0 0 1px rgba(13,13,13,.9));}

/* ============ TITLE LOGO ============ */
#title .titlewrap{position:relative;z-index:20;text-align:center;animation:floatUp 1s ease;}
@keyframes floatUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.kotitle{
  display:block;margin:0 auto;width:min(86vw,600px);height:auto;
  image-rendering:pixelated;
  animation:logoglow 3.5s ease-in-out infinite;
}
@keyframes logoglow{
  0%,100%{filter:drop-shadow(4px 4px 0 var(--ice-d)) drop-shadow(8px 8px 0 var(--black)) drop-shadow(0 0 14px rgba(77,204,237,.4));}
  50%{filter:drop-shadow(4px 4px 0 var(--ice-d)) drop-shadow(8px 8px 0 var(--black)) drop-shadow(0 0 30px rgba(77,204,237,.85));}
}
.entitle{
  font-weight:800;font-size:clamp(18px,4vw,40px);letter-spacing:8px;color:var(--ice);
  margin-top:10px;text-shadow:3px 3px 0 var(--black);
}
.tagline{margin-top:18px;color:var(--g4);font-size:clamp(13px,2.4vw,19px);text-shadow:2px 2px 0 var(--black);}
.start-row{margin-top:42px;display:flex;flex-direction:column;align-items:center;gap:14px;}
.start-btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
.press{font-weight:800;font-size:20px;color:var(--gold);animation:blink 1.05s steps(2) infinite;text-shadow:2px 2px 0 var(--black);}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
.credit{position:absolute;bottom:14px;left:0;width:100%;text-align:center;color:var(--g2);font-size:12px;z-index:20;}

/* ============ HEADINGS ============ */
.scr-head{text-align:center;margin-bottom:22px;z-index:20;}
.scr-kick{color:var(--ice);font-weight:800;letter-spacing:3px;font-size:14px;margin-bottom:6px;}
.scr-title{font-weight:800;font-size:clamp(24px,4.5vw,40px);color:var(--pure);text-shadow:3px 3px 0 var(--black);}
.scr-sub{color:var(--g3);font-size:14px;margin-top:8px;}

/* ============ GUIDE SELECT ============ */
.guide-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;max-width:920px;width:100%;z-index:20;}
.gcard{
  background:var(--panel);border:3px solid var(--line);padding:18px 12px 16px;text-align:center;
  cursor:pointer;transition:transform .15s, border-color .15s, box-shadow .15s;position:relative;
  box-shadow:0 0 0 3px var(--black);
}
.gcard:hover{transform:translateY(-8px);border-color:var(--ice);box-shadow:0 0 0 3px var(--black),0 10px 24px rgba(77,204,237,.18);}
.gcard.sel{border-color:var(--gold);box-shadow:0 0 0 3px var(--black),0 0 22px rgba(251,202,67,.35);}
.gcard .portrait{height:96px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:12px;}
.gcard .portrait img{height:auto;animation:bob 1.6s steps(2) infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.gcard .gname{font-weight:800;font-size:20px;color:var(--ice);}
.gcard .grole{font-size:12px;color:var(--gold);margin:6px 0;letter-spacing:1px;}
.gcard .gdesc{font-size:12px;color:var(--g4);line-height:1.5;min-height:48px;}
.gcard .gtag{display:inline-block;margin-top:8px;font-size:11px;color:var(--black);background:var(--ice-m);padding:2px 8px;}

/* ============ NPC DIALOG DOCK ============ */
#dock{
  position:fixed;left:0;bottom:0;width:100%;z-index:55;display:none;
  padding:0 18px 18px;pointer-events:none;
}
#dock.show{display:block;animation:dockUp .4s ease;}
@keyframes dockUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.dock-inner{max-width:860px;margin:0 auto;display:flex;gap:14px;align-items:flex-end;pointer-events:auto;}
.dock-portrait{
  flex:0 0 auto;width:86px;height:86px;background:var(--panel);border:3px solid var(--ice-d);
  box-shadow:0 0 0 3px var(--black);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;
}
.dock-portrait img{height:auto;animation:bob 1.5s steps(2) infinite;}
.dock-bubble{
  flex:1;background:var(--panel);border:3px solid var(--ice-d);box-shadow:0 0 0 3px var(--black);
  padding:14px 18px;min-height:74px;position:relative;
}
.dock-name{position:absolute;top:-14px;left:14px;background:var(--ice);color:var(--black);
  font-weight:800;font-size:13px;padding:2px 10px;box-shadow:0 0 0 3px var(--black);}
.dock-text{font-size:16px;line-height:1.55;color:var(--white);}
.dock-text .cur{color:var(--gold);animation:blink 1s steps(2) infinite;}

/* ============ PARTY / USERS ============ */
.party-box{width:100%;max-width:560px;z-index:20;}
.party-add{display:flex;gap:10px;margin-bottom:16px;align-items:stretch;}
.party-add .btn{flex:0 0 auto;white-space:nowrap;padding-left:18px;padding-right:18px;font-size:16px;}
.inp{
  flex:1 1 0;min-width:0;font-family:'Stardust',monospace;font-size:17px;color:var(--pure);
  background:var(--panel-2);border:3px solid var(--line);padding:13px 14px;outline:none;
}
.inp:focus{border-color:var(--ice);}
.user-list{display:flex;flex-direction:column;gap:10px;max-height:34vh;overflow-y:auto;padding-right:6px;}
.user-row{
  display:flex;align-items:center;gap:12px;background:var(--panel);border:3px solid var(--line);
  padding:10px 12px;box-shadow:0 0 0 3px var(--black);animation:floatUp .3s ease;
}
.user-row .uava{width:40px;height:40px;background:var(--panel-2);border:2px solid var(--ice-d);display:flex;align-items:flex-end;justify-content:center;flex:0 0 auto;}
.user-row .uava img{height:32px;width:auto;}
.user-row .uname{flex:1;font-size:17px;color:var(--white);font-weight:700;}
.user-row .ulead{font-size:11px;color:var(--gold);border:2px solid var(--gold-d);padding:1px 6px;}
.user-row .udel{cursor:pointer;color:var(--red-l);font-weight:800;font-size:18px;padding:0 6px;}
.user-row .udel:hover{color:var(--red);}
.party-foot{display:flex;justify-content:space-between;align-items:center;margin-top:18px;}
.party-count{color:var(--g4);font-size:14px;}
.party-count b{color:var(--ice);font-size:20px;}

/* ============ MAP ============ */
#map .map-stage{position:relative;z-index:20;display:flex;flex-direction:column;align-items:center;}
.map-frame{position:relative;background:linear-gradient(#0a1016,#0d171f);padding:14px;}
#japan{image-rendering:pixelated;display:block;}
.markers{position:absolute;inset:14px;pointer-events:none;}
/* route line overlay */
.route-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:visible;}
.route-line-glow{fill:none;stroke:var(--gold);stroke-width:8px;opacity:.22;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke;}
.route-line{fill:none;stroke:var(--gold);stroke-width:2.6px;stroke-linecap:round;stroke-linejoin:round;
  vector-effect:non-scaling-stroke;stroke-dasharray:7 6;animation:routeFlow .8s linear infinite;}
@keyframes routeFlow{to{stroke-dashoffset:-13;}}
.route-arrow{fill:var(--gold);stroke:var(--black);stroke-width:.3;}
.mk{position:absolute;transform:translate(-50%,-50%);pointer-events:auto;cursor:pointer;text-align:center;z-index:5;}
.mk .dot{width:11px;height:11px;border-radius:50%;background:var(--ice-m);border:2px solid var(--ice);
  box-shadow:0 0 0 2px var(--black);margin:0 auto;transition:transform .12s,background .12s;}
.mk:hover .dot{background:var(--ice);transform:scale(1.25);}
.mk .mlabel{font-size:11px;color:var(--white);margin-top:3px;text-shadow:1px 1px 0 var(--black),0 0 4px var(--black);white-space:nowrap;font-weight:700;}
/* order badge */
.mk .mk-num{position:absolute;left:50%;top:-4px;transform:translate(-50%,-100%);
  background:var(--gold);color:var(--black);font-size:10px;font-weight:800;line-height:15px;height:15px;min-width:15px;
  padding:0 3px;border-radius:8px;border:1.5px solid var(--black);box-shadow:0 0 0 1.5px var(--gold);white-space:nowrap;}
.mk.sel{z-index:7;}
.mk.sel .dot{background:var(--gold);border-color:var(--pure);box-shadow:0 0 0 2px var(--black),0 0 10px var(--gold);}
.mk.sel .mlabel{color:var(--gold);font-weight:800;}
/* start node = green flag */
.mk.start .dot{background:#5fe08a;border-color:var(--pure);box-shadow:0 0 0 2px var(--black),0 0 10px #5fe08a;}
.mk.start .mk-num{background:#5fe08a;box-shadow:0 0 0 1.5px #5fe08a;}
.mk.start .mlabel{color:#7df0a3;}
.mk.start::after{content:"";position:absolute;left:50%;top:5px;width:26px;height:26px;transform:translate(-50%,-50%);
  border:2px solid #5fe08a;border-radius:50%;animation:pulse 1.5s ease-out infinite;}
.mk.active .dot{transform:scale(1.3);background:var(--pure);}
@keyframes pulse{0%{opacity:.9;transform:translate(-50%,-50%) scale(.5)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.7)}}

/* region popup */
.rpop{position:absolute;z-index:30;width:184px;display:none;pointer-events:auto;
  transform:translate(-50%,-104%);
  background:var(--panel);border:8px solid transparent;border-image:url('./Asset/Frame/ui/gf_thin.png') 7 stretch;
  box-shadow:0 0 0 3px var(--black);padding:10px 12px 12px;}
.rpop.show{display:block;animation:floatUp .2s ease;}
.rpop.below{transform:translate(-50%,14%);}
.rpop-x{position:absolute;top:2px;right:6px;color:var(--g3);font-weight:800;cursor:pointer;font-size:14px;}
.rpop-x:hover{color:var(--red-l);}
.rpop-name{font-weight:800;font-size:16px;color:var(--ice);margin-bottom:4px;}
.rpop-route{font-size:11px;font-weight:800;color:var(--gold);margin:-2px 0 6px;}
.rpop-route.start{color:#7df0a3;}
.rpop-diff{font-size:11px;color:var(--g4);margin-bottom:2px;}
.rpop-stars{font-size:13px;letter-spacing:1px;margin-bottom:8px;}
.rpop-stars .on{color:var(--gold);}
.rpop-stars .off{color:var(--g2);}
.rpop-desc{font-size:12px;color:var(--g4);line-height:1.5;margin-bottom:10px;}
.rpop-btn{width:100%;font-family:'Stardust';font-weight:800;font-size:13px;cursor:pointer;
  background:var(--ice);color:var(--black);border:none;padding:8px;box-shadow:0 3px 0 var(--ice-d),0 3px 0 2px var(--black);}
.rpop-btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ice-d),0 1px 0 2px var(--black);}
.rpop-btn.on{background:var(--gold);box-shadow:0 3px 0 var(--gold-d),0 3px 0 2px var(--black);}

.map-legend{margin-top:14px;color:var(--g3);font-size:12px;text-align:center;max-width:340px;}
.map-legend b{color:var(--gold);}
/* ===== departure board (전광판) ===== */
.depboard{width:100%;max-width:560px;margin:0 auto 16px;background:#070b0e;
  border:3px solid var(--line);box-shadow:inset 0 0 0 2px var(--black),0 0 0 3px var(--black),0 0 22px rgba(251,202,67,.10);
  padding:9px 11px 11px;position:relative;}
.depboard::after{content:"";position:absolute;inset:3px;pointer-events:none;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,.16) 3px);}
.dep-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;
  border-bottom:1px dashed #2a3942;padding-bottom:7px;}
.dep-led{width:9px;height:9px;border-radius:50%;background:var(--gold);box-shadow:0 0 7px var(--gold);
  animation:depBlink 1.1s steps(1) infinite;}
@keyframes depBlink{50%{opacity:.25;box-shadow:none;}}
.dep-title{font-size:12px;letter-spacing:2px;color:#ffd866;font-weight:800;text-shadow:0 0 6px rgba(251,202,67,.5);}
.dep-count{margin-left:auto;font-size:11px;color:#7c8a93;letter-spacing:1px;}
.dep-track{display:flex;align-items:stretch;gap:0;overflow-x:auto;min-height:52px;padding:9px 2px 4px;perspective:480px;}
.dep-empty{color:#5a6b74;font-size:12px;letter-spacing:1px;align-self:center;padding:6px 4px;}
.dep-arrow{display:flex;align-items:center;color:var(--gold);font-size:15px;padding:0 5px;opacity:.8;}
.dep-card{position:relative;flex:0 0 auto;min-width:62px;background:#15110a;border:1px solid #3a2f12;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5px 12px 6px;
  box-shadow:inset 0 0 0 1px #000;transform-origin:top center;animation:depFlip .34s ease-out;}
.dep-card::before{content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(0,0,0,.6);}
@keyframes depFlip{0%{transform:rotateX(-90deg);opacity:0;}60%{transform:rotateX(12deg);}100%{transform:rotateX(0);opacity:1;}}
.dep-no{font-size:9px;color:#9b7a2a;letter-spacing:1px;margin-bottom:1px;}
.dep-name{font-size:15px;font-weight:800;color:#ffcf4d;letter-spacing:1px;text-shadow:0 0 6px rgba(251,202,67,.45);white-space:nowrap;}
.dep-sub{font-size:8px;color:#8a6f2e;letter-spacing:1px;text-transform:uppercase;}
.dep-card.start .dep-name{color:#7df0a3;text-shadow:0 0 6px rgba(125,240,163,.5);}
.dep-card.start .dep-no{color:#3f9c63;}
.dep-x{position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:#3a2412;
  border:1px solid #6b4a1d;color:#ffcf4d;font-size:10px;line-height:14px;text-align:center;cursor:pointer;z-index:2;}
.dep-x:hover{background:var(--red,#c0392b);color:#fff;}
.map-foot{display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap;justify-content:center;}
.map-sel{color:var(--g4);font-size:13px;}
.map-sel b{color:var(--gold);font-size:18px;}
.btn-mini{font-family:'Stardust';font-size:12px;font-weight:700;cursor:pointer;color:var(--white);
  background:#15212c;border:2px solid var(--g2);padding:5px 10px;border-radius:3px;transition:.12s;}
.btn-mini:hover:not(:disabled){border-color:var(--ice);color:var(--ice);}
.btn-mini:disabled{opacity:.35;cursor:default;}

/* ============ SURVEY ============ */
.survey-box{width:100%;max-width:600px;z-index:20;}
.steps{display:flex;justify-content:center;gap:7px;margin-bottom:18px;}
.steps i{width:10px;height:10px;background:var(--line);box-shadow:0 0 0 2px var(--black);transition:background .2s;}
.steps i.on{background:var(--ice);}
.steps i.done{background:var(--ice-m);}
.qcard{background:var(--panel);border:3px solid var(--ice-d);box-shadow:0 0 0 3px var(--black);padding:26px 24px;min-height:230px;display:flex;flex-direction:column;}
.qnum{color:var(--gold);font-weight:800;font-size:13px;letter-spacing:2px;margin-bottom:6px;}
.qtitle{font-weight:800;font-size:22px;color:var(--pure);margin-bottom:18px;line-height:1.35;}
.opts{display:flex;flex-wrap:wrap;gap:11px;}
.opt{
  font-family:'Stardust',monospace;font-size:16px;font-weight:700;color:var(--white);
  background:var(--panel-2);border:3px solid var(--line);padding:12px 18px;cursor:pointer;
  transition:transform .1s,border-color .15s,background .15s,color .15s;
}
.opt:hover{border-color:var(--ice);transform:translateY(-2px);}
.opt.sel{background:var(--ice);color:var(--black);border-color:var(--ice);}
.opt.multi.sel{background:var(--gold);border-color:var(--gold);}
.q-hint{color:var(--g3);font-size:13px;margin-top:14px;}
/* budget */
.budget-val{font-weight:800;font-size:36px;color:var(--gold);text-align:center;margin:6px 0 14px;text-shadow:2px 2px 0 var(--black);}
.budget-val small{font-size:16px;color:var(--g4);}
input[type=range]{-webkit-appearance:none;width:100%;height:14px;background:var(--panel-2);border:3px solid var(--line);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;background:var(--ice);border:3px solid var(--black);cursor:pointer;box-shadow:0 0 0 2px var(--ice-d);}
.budget-marks{display:flex;justify-content:space-between;color:var(--g3);font-size:11px;margin-top:8px;}
.budget-quick{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
.budget-quick .opt{padding:8px 12px;font-size:13px;}
/* nights stepper */
.stepper{display:flex;align-items:center;justify-content:center;gap:18px;margin:10px 0;}
.stepper button{font-family:'Stardust';font-weight:800;font-size:26px;width:54px;height:54px;background:var(--ice);color:var(--black);border:none;box-shadow:0 4px 0 var(--ice-d),0 4px 0 3px var(--black);cursor:pointer;}
.stepper button:active{transform:translateY(3px);box-shadow:0 1px 0 var(--ice-d),0 1px 0 3px var(--black);}
.stepper .nval{font-weight:800;font-size:30px;color:var(--pure);min-width:120px;text-align:center;}
.stepper .nval small{display:block;font-size:14px;color:var(--g4);font-weight:400;}
/* month */
.months{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
.month{width:88px;text-align:center;}
.survey-foot{display:flex;justify-content:space-between;margin-top:20px;}

/* ============ LOADING ============ */
#loading .load-box{z-index:20;text-align:center;max-width:520px;width:100%;}
.load-npc{margin-bottom:20px;}
.load-npc img{height:74px;width:auto;animation:bob 1s steps(2) infinite;filter:drop-shadow(0 0 10px rgba(77,204,237,.5));}
.load-title{font-weight:800;font-size:26px;color:var(--pure);margin-bottom:8px;}
.load-line{color:var(--ice);font-size:15px;height:22px;margin-bottom:22px;}
.bar{height:26px;background:var(--panel-2);border:3px solid var(--ice-d);box-shadow:0 0 0 3px var(--black);position:relative;overflow:hidden;}
.bar .fill{height:100%;width:0%;background:repeating-linear-gradient(90deg,var(--ice) 0 10px,var(--ice-m) 10px 20px);transition:width .2s linear;}
.bar .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--black);font-size:14px;mix-blend-mode:difference;}

/* ============ PLAN RESULT ============ */
#plan{justify-content:flex-start;padding-top:30px;padding-bottom:140px;overflow-y:auto;align-items:center;}
.plan-wrap{width:100%;max-width:780px;z-index:20;}
.plan-hero{text-align:center;margin-bottom:18px;}
.plan-hero .scr-kick{color:var(--gold);}
.plan-hero h2{font-weight:800;font-size:clamp(24px,4vw,34px);color:var(--pure);text-shadow:3px 3px 0 var(--black);}
.plan-hero .ph-sub{color:var(--g4);font-size:14px;margin-top:8px;}
.plan-meta{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px;}
.chip{font-size:12px;color:var(--ice);background:var(--panel);border:2px solid var(--ice-d);padding:5px 10px;box-shadow:0 0 0 2px var(--black);}
.chip b{color:var(--gold);}

.budget-card{background:var(--panel);border:3px solid var(--line);box-shadow:0 0 0 3px var(--black);padding:16px 18px;margin:18px 0;}
.budget-card .bc-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;font-size:14px;color:var(--g4);}
.budget-card .bc-top b{color:var(--gold);font-size:20px;}
.bc-bar{height:20px;background:var(--panel-2);border:2px solid var(--line);position:relative;overflow:hidden;}
.bc-bar .bf{height:100%;background:repeating-linear-gradient(90deg,var(--green) 0 8px,var(--green-d) 8px 16px);transition:width .8s ease;}
.bc-bar.over .bf{background:repeating-linear-gradient(90deg,var(--red) 0 8px,var(--red-d) 8px 16px);}
.bc-note{font-size:12px;color:var(--g3);margin-top:8px;}

.day-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.day-tab{font-family:'Stardust';font-weight:800;font-size:14px;color:var(--g4);background:var(--panel);border:3px solid var(--line);padding:9px 16px;cursor:pointer;box-shadow:0 0 0 2px var(--black);}
.day-tab.on{background:var(--ice);color:var(--black);border-color:var(--ice);}

.day-panel{display:none;}
.day-panel.on{display:block;animation:floatUp .4s ease;}
.day-head{color:var(--gold);font-weight:800;font-size:16px;margin-bottom:14px;border-bottom:2px solid var(--line);padding-bottom:8px;}

.tl{position:relative;padding-left:8px;}
.tl-item{display:flex;gap:14px;margin-bottom:14px;align-items:stretch;animation:floatUp .4s ease both;}
.tl-time{flex:0 0 56px;text-align:right;color:var(--ice);font-weight:800;font-size:13px;padding-top:14px;}
.tl-rail{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;}
.tl-icon{width:42px;height:42px;background:var(--panel);border:3px solid var(--ice-d);box-shadow:0 0 0 2px var(--black);display:flex;align-items:center;justify-content:center;}
.tl-icon img{height:24px;width:auto;}
.tl-icon.meal{border-color:var(--gold-d);}
.tl-line{flex:1;width:3px;background:var(--line);margin:2px 0;}
.tl-item:last-child .tl-line{display:none;}
.tl-card{flex:1;background:var(--panel);border:3px solid var(--line);box-shadow:0 0 0 2px var(--black);padding:12px 14px;}
.tl-card .tc-top{display:flex;justify-content:space-between;gap:10px;align-items:baseline;}
.tl-card .tc-name{font-weight:800;font-size:17px;color:var(--pure);}
.tl-card .tc-area{font-size:11px;color:var(--g3);}
.tl-card .tc-cost{font-size:13px;color:var(--gold);font-weight:800;white-space:nowrap;}
.tl-card .tc-desc{font-size:13px;color:var(--g4);line-height:1.5;margin-top:6px;}
.tl-card .tc-tip{font-size:12px;color:var(--ice);margin-top:8px;border-left:3px solid var(--ice-d);padding-left:8px;}
.tl-card .tc-tip b{color:var(--gold);}
.tc-links{display:flex;gap:8px;margin-top:10px;}
.tc-links a{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;
  background:var(--panel-2);border:2px solid var(--line);box-shadow:0 0 0 2px var(--black);
  color:var(--g3);cursor:pointer;transition:transform .1s,color .15s,border-color .15s;}
.tc-links a:hover{transform:translateY(-2px);}
.tc-links a.ig:hover{color:var(--pink);border-color:var(--pink-d);}
.tc-links a.gm:hover{color:var(--green);border-color:var(--green-d);}
.tc-links svg{width:18px;height:18px;display:block;}

.plan-foot{display:flex;gap:12px;justify-content:center;margin-top:26px;flex-wrap:wrap;}
.plan-tipbox{background:var(--panel);border:3px solid var(--gold-d);box-shadow:0 0 0 2px var(--black);padding:14px 16px;margin-top:18px;}
.plan-tipbox .pt-h{color:var(--gold);font-weight:800;font-size:14px;margin-bottom:6px;}
.plan-tipbox ul{list-style:none;}
.plan-tipbox li{font-size:13px;color:var(--g4);line-height:1.6;padding-left:14px;position:relative;}
.plan-tipbox li::before{content:"›";position:absolute;left:0;color:var(--ice);}

/* back button small */
.backbtn{position:fixed;top:16px;left:16px;z-index:70;font-family:'Stardust';font-weight:800;font-size:13px;
  background:var(--panel);color:var(--ice);border:3px solid var(--ice-d);box-shadow:0 0 0 3px var(--black);
  padding:8px 14px;cursor:pointer;display:none;}
.backbtn:hover{background:var(--water-dd);color:var(--pure);}
.backbtn.show{display:block;}

/* ============ CAMP (room/snowfield deco) ============ */
#camp{justify-content:flex-start;padding-top:26px;padding-bottom:170px;overflow-y:auto;}
.camp-tabs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;z-index:20;}
.camp-tab{font-family:'Stardust';font-weight:800;font-size:14px;color:var(--g4);background:var(--panel);border:3px solid var(--line);padding:8px 14px;cursor:pointer;box-shadow:0 0 0 2px var(--black);}
.camp-tab.on{background:var(--ice);color:var(--black);border-color:var(--ice);}
.camp-tab.all{color:var(--gold);}
.camp-tab.all.on{background:var(--gold);color:var(--black);border-color:var(--gold);}
.camp-main{z-index:20;display:flex;flex-direction:column;align-items:center;gap:18px;width:100%;}

.stage-wrap{position:relative;}
.camp-stage{position:relative;width:360px;height:260px;overflow:hidden;transform-origin:top left;
  background:linear-gradient(#0a0f16 0%,#0d141c 55%,#0d0d0d 100%);
  border:3px solid var(--ice-d);box-shadow:0 0 0 3px var(--black),inset 0 0 30px rgba(13,13,13,.8);}
.camp-stage .cs-aurora{position:absolute;top:0;left:-10%;width:120%;height:42%;opacity:.4;mix-blend-mode:screen;
  background:radial-gradient(120% 60% at 40% 0%,rgba(77,204,237,.25) 50%,rgba(93,227,74,.18) 72%,rgba(13,13,13,0) 90%);}
.camp-stage .cs-ground{position:absolute;left:0;bottom:0;width:100%;height:42px;
  background:#0d0d0d url('./Asset/ground_tile.png') repeat-x top left;image-rendering:pixelated;}
.cs-slot{position:absolute;transform:translate(-50%,-100%);cursor:pointer;}
.cs-slot .ph{position:absolute;left:50%;top:0;transform:translate(-50%,-50%);
  width:24px;height:24px;border:2px dashed var(--ice-m);border-radius:4px;opacity:.45;
  display:flex;align-items:center;justify-content:center;color:var(--ice-m);font-size:15px;font-weight:800;}
.cs-slot.filled .ph{display:none;}
.cs-slot img{display:block;width:auto;filter:drop-shadow(0 1px 0 rgba(13,13,13,.9));}
.cs-slot:hover .ph{opacity:.95;border-color:var(--ice);}
.cs-slot.filled:hover img{filter:drop-shadow(0 0 4px rgba(251,202,67,.9));}

.camp-palette{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:400px;padding-bottom:20px;}
.pal-item{width:52px;height:52px;background:var(--panel);border:3px solid var(--line);box-shadow:0 0 0 2px var(--black);
  display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:transform .1s,border-color .15s;}
.pal-item:hover{transform:translateY(-2px);border-color:var(--ice);}
.pal-item.sel{border-color:var(--gold);box-shadow:0 0 0 2px var(--black),0 0 12px rgba(251,202,67,.4);}
.pal-item img{max-width:36px;max-height:36px;width:auto;height:auto;}
.pal-item .pl-name{position:absolute;bottom:-15px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--g3);white-space:nowrap;}
.pal-item.eraser{font-size:20px;color:var(--red-l);font-weight:800;}

.camp-all{display:grid;grid-template-columns:repeat(auto-fit,minmax(176px,1fr));gap:18px;width:100%;max-width:780px;}
.camp-card{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;}
.camp-card .cc-name{font-weight:800;color:var(--ice);font-size:15px;}
.camp-card .cc-name .lead{color:var(--gold);font-size:10px;margin-left:4px;border:2px solid var(--gold-d);padding:0 4px;}
.mini-wrap{overflow:hidden;border:3px solid var(--line);box-shadow:0 0 0 2px var(--black);}
.camp-card:hover .mini-wrap{border-color:var(--ice);}
.camp-hint{color:var(--g3);font-size:12px;text-align:center;max-width:360px;line-height:1.5;}

/* ============ GAME FRAME SKIN (Chroma Noir UI pack) ============ */
.qcard,.budget-card,.plan-tipbox,.party-box,.map-frame,
.dock-bubble,.dock-portrait,.items-panel{
  border:8px solid transparent;
  border-image:url('./Asset/Frame/ui/gf_bold.png') 8 stretch;
  background-color:var(--panel);
  box-shadow:0 0 0 3px var(--black);
}
.plan-tipbox{background-color:var(--panel);}
/* drop the old ice corner-gems on reskinned panels */
.party-box::before,.party-box::after,.map-frame::before,.map-frame::after{display:none;}

/* banner-style title plates */
.scr-title,.plan-hero h2{
  display:inline-block;
  border:9px solid transparent;
  border-image:url('./Asset/Frame/ui/gf_bold.png') 8 stretch;
  background-color:var(--panel-2);
  padding:5px 26px;box-shadow:0 0 0 3px var(--black);
}
/* inventory / stat boxes get a distinct rivet-corner frame */
.budget-card,.items-panel{border-image:url('./Asset/Frame/ui/gf_rivet.png') 8 stretch;}
.camp-stage{border:8px solid transparent;border-image:url('./Asset/Frame/ui/gf_bold.png') 8 stretch;}

/* guide cards — thin ice frame, gold frame when selected */
.gcard{border:7px solid transparent;border-image:url('./Asset/Frame/ui/gf_thin.png') 7 stretch;box-shadow:0 0 0 3px var(--black);}
.gcard:hover{transform:translateY(-8px);box-shadow:0 0 0 3px var(--black),0 10px 24px rgba(77,204,237,.2);}
.gcard.sel{border-image:url('./Asset/Frame/ui/gf_thin_gold.png') 7 stretch;box-shadow:0 0 0 3px var(--black),0 0 22px rgba(251,202,67,.4);}
/* inputs — thin ice frame */
.inp{border:7px solid transparent;border-image:url('./Asset/Frame/ui/gf_thin.png') 7 stretch;}
.inp:focus{box-shadow:0 0 0 2px var(--ice);}
/* option chips — ice border tone */
.opt{border-color:var(--ice-d);}
.opt:hover{border-color:var(--ice);}

.items-panel{padding:18px 14px 16px;position:relative;margin-top:10px;max-width:430px;}
.items-panel .camp-palette{padding-bottom:0;margin:0;}
.items-title{position:absolute;top:-13px;left:50%;transform:translateX(-50%);
  background:var(--ice);color:var(--black);font-weight:800;font-size:13px;letter-spacing:2px;
  padding:2px 16px;box-shadow:0 0 0 3px var(--black);white-space:nowrap;}

/* ============ BASE CAMP HUB ============ */
#basecamp{justify-content:flex-start;padding-top:26px;padding-bottom:170px;overflow-y:auto;}
.bc-wrap{width:100%;max-width:760px;z-index:20;display:flex;flex-direction:column;gap:16px;}
.bc-hero{position:relative;border:8px solid transparent;border-image:url('./Asset/Frame/ui/gf_bold.png') 8 stretch;
  box-shadow:0 0 0 3px var(--black);background:#0d0d0d;overflow:hidden;}
.bc-hero img{display:block;width:100%;height:auto;image-rendering:pixelated;}
.bc-hero .bc-plate{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);
  font-weight:800;font-size:12px;letter-spacing:2px;color:var(--ice);
  background:rgba(13,13,13,.72);padding:3px 12px;box-shadow:0 0 0 2px var(--black);white-space:nowrap;}
.bc-guide,.bc-op{border:8px solid transparent;border-image:url('./Asset/Frame/ui/gf_bold.png') 8 stretch;background-color:var(--panel);box-shadow:0 0 0 3px var(--black);}
.bc-guide{display:flex;align-items:center;gap:14px;padding:14px;}
.bc-guide .bc-portrait{flex:0 0 auto;width:74px;height:74px;background:var(--panel-2);border:3px solid var(--ice-d);box-shadow:0 0 0 2px var(--black);display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;}
.bc-guide .bc-portrait img{height:auto;animation:bob 1.6s steps(2) infinite;}
.bc-guide .bc-gtext{flex:1;min-width:0;}
.bc-guide .bc-gname{font-weight:800;font-size:18px;color:var(--ice);}
.bc-guide .bc-grole{font-size:12px;color:var(--gold);margin:2px 0 8px;}
.bc-guide .bc-dests{display:flex;flex-wrap:wrap;gap:6px;}
.bc-sec{display:flex;align-items:center;gap:8px;color:var(--gold);font-weight:800;font-size:14px;letter-spacing:1px;margin:6px 2px -2px;}
.bc-sec b{color:var(--ice);}
.bc-op{display:flex;flex-wrap:wrap;gap:8px;padding:14px;}
.bc-roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(212px,1fr));gap:14px;}
.bc-member{display:flex;flex-direction:column;gap:9px;padding:12px;border:7px solid transparent;border-image:url('./Asset/Frame/ui/gf_thin.png') 7 stretch;background:var(--panel);box-shadow:0 0 0 3px var(--black);}
.bc-m-top{display:flex;align-items:center;gap:10px;}
.bc-m-ava{width:42px;height:42px;background:var(--panel-2);border:2px solid var(--ice-d);box-shadow:0 0 0 2px var(--black);display:flex;align-items:flex-end;justify-content:center;flex:0 0 auto;}
.bc-m-ava img{height:34px;width:auto;}
.bc-m-name{flex:1;font-weight:800;font-size:16px;color:var(--white);}
.bc-m-lead{font-size:10px;color:var(--gold);border:2px solid var(--gold-d);padding:1px 5px;}
.bc-m-mini{overflow:hidden;border:2px solid var(--line);box-shadow:0 0 0 2px var(--black);align-self:center;}
.bc-comment{width:100%;font-family:'Stardust',monospace;font-size:12px;color:var(--white);background:var(--panel-2);border:2px solid var(--line);padding:7px 9px;outline:none;}
.bc-comment:focus{border-color:var(--ice);}
.bc-m-deco{font-family:'Stardust';font-weight:800;font-size:12px;color:var(--ice);background:var(--panel-2);border:2px solid var(--ice-d);box-shadow:0 0 0 2px var(--black);padding:7px;cursor:pointer;}
.bc-m-deco:hover{background:var(--water-dd);color:var(--pure);}
.bc-foot{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px;}

@media(max-width:720px){
  .guide-grid{grid-template-columns:repeat(2,1fr);}
  .dock-portrait{width:64px;height:64px;}
  .tl-time{flex-basis:44px;font-size:11px;}
}
</style>
</head>
<body>
<div id="app">

  <button class="backbtn" id="backbtn" data-t="back"></button>

  <!-- ============ TITLE ============ -->
  <section class="screen active" id="title">
    <div id="scene">
      <div class="stars" id="stars"></div>
    </div>
    <div class="titlewrap">
      <img class="kotitle" src="./Asset/title_ko.png" alt="눈길원정대">

      <div class="entitle">SNOW QUEST</div>
      <div class="tagline" data-t="tagline"></div>
      <div class="start-row">
        <div class="start-btns">
          <button class="btn gold" id="startBtn" data-t="start"></button>
          <button class="btn ghost" id="baseBtn" data-t="base_btn" style="display:none"></button>
        </div>
        <div class="press" data-t="press"></div>
      </div>
    </div>
    <div class="credit">Chroma Noir Arctic · PF스타더스트 3.0 · made for winter trips</div>
  </section>

  <!-- ============ GUIDE SELECT ============ -->
  <section class="screen" id="guide">
    <div class="scr-head">
      <div class="scr-kick" data-t="g_kick"></div>
      <div class="scr-title" data-t="g_title"></div>
      <div class="scr-sub" data-t="g_sub"></div>
    </div>
    <div class="guide-grid" id="guideGrid"></div>
    <div style="margin-top:26px;z-index:20;">
      <button class="btn" id="guideNext" disabled data-t="g_next"></button>
    </div>
  </section>

  <!-- ============ PARTY ============ -->
  <section class="screen" id="party">
    <div class="scr-head">
      <div class="scr-kick" data-t="p_kick"></div>
      <div class="scr-title" data-t="p_title"></div>
    </div>
    <div class="party-box panel" style="padding:22px;">
      <div class="party-add">
        <input class="inp" id="userInput" maxlength="10" data-ph="p_ph">
        <button class="btn" id="userAdd" data-t="p_add"></button>
      </div>
      <div class="user-list" id="userList"></div>
      <div class="party-foot">
        <div class="party-count"><span data-t="p_count"></span> <b id="userCount">0</b><span data-t="p_people"></span></div>
        <button class="btn gold" id="partyNext" disabled data-t="p_next"></button>
      </div>
    </div>
  </section>

  <!-- ============ MAP ============ -->
  <section class="screen" id="map">
    <div class="scr-head">
      <div class="scr-kick" data-t="m_kick"></div>
      <div class="scr-title" data-t="m_title"></div>
    </div>
    <!-- departure board (train-destination 전광판) -->
    <div class="depboard">
      <div class="dep-head">
        <span class="dep-led"></span>
        <span class="dep-title" data-t="dep_title"></span>
        <span class="dep-count" id="depCount"></span>
      </div>
      <div class="dep-track" id="depTrack"></div>
    </div>
    <div class="map-stage">
      <div class="map-frame panel">

/* ===================== SNOW CANVAS ===================== */
(function snow(){
  var cv=document.getElementById('snow'), ctx=cv.getContext('2d');
  var flakes=[];
  function resize(){ cv.width=window.innerWidth; cv.height=window.innerHeight;
    flakes=[]; var n=Math.round(cv.width*cv.height/16000);
    for(var i=0;i<n;i++) flakes.push({x:Math.random()*cv.width,y:Math.random()*cv.height,s:1+Math.random()*2.5,vy:0.4+Math.random()*1.4,vx:-0.4+Math.random()*0.8,o:0.3+Math.random()*0.6});
  }
  resize(); window.addEventListener('resize',resize);
  function loop(){
    ctx.clearRect(0,0,cv.width,cv.height);
    for(var i=0;i<flakes.length;i++){ var f=flakes[i];
      f.y+=f.vy; f.x+=f.vx+Math.sin(f.y*0.01)*0.3;
      if(f.y>cv.height){ f.y=-4; f.x=Math.random()*cv.width; }
      if(f.x>cv.width) f.x=0; if(f.x<0) f.x=cv.width;
      ctx.fillStyle='rgba(217,217,217,'+f.o+')';
      var s=Math.round(f.s); ctx.fillRect(Math.round(f.x),Math.round(f.y),s,s);
    }
    requestAnimationFrame(loop);
  }
  loop();
})();

    cv.style.width=(W*px)+'px'; cv.style.height=(H*px)+'px';
    var ctx=cv.getContext('2d');
    var gap=px>=9?1:0;                /* tile gap → mosaic look like the reference */
    for(var r=0;r<H;r++)for(var c=0;c<W;c++){
      if(grid[r][c]){
        var north=(r>0?grid[r-1][c]:0);
        /* deterministic per-tile shade variation for the dotted-mosaic feel */
        var h=((c*73+r*131)%7);
        var base = north ? ['#2c4a63','#274359','#315169'][h%3]
                         : ['#4dcced','#3ab6dd','#5fd6f2','#46c4e6'][h%4];
        ctx.fillStyle=base;
        ctx.fillRect(c*px,r*px,px-gap,px-gap);
        ctx.fillStyle='rgba(13,13,13,0.12)';
        ctx.fillRect(c*px,r*px+Math.floor(px*0.62),px-gap,Math.ceil(px*0.38)-gap);
      }
    }
    var mk=document.getElementById('markers');
    mk.style.width=(W*px)+'px'; mk.style.height=(H*px)+'px';
  }
  hidePop();
  renderMarkers();
  drawRoute();
  updateBoard();
  updateMapFoot();
}
/* keep S.dests (unique, first-visit order) derived from the ordered route */
function syncDests(){
  var seen={}, out=[];
  S.route.forEach(function(id){ if(!seen[id]){ seen[id]=1; out.push(id); } });
  S.dests=out;
}
function afterRoute(){ syncDests(); renderMarkers(); drawRoute(); updateBoard(); updateMapFoot(); saveState('map'); }
function renderMarkers(){
  var mk=document.getElementById('markers');
  var olds=mk.querySelectorAll('.mk'); for(var i=0;i<olds.length;i++) olds[i].remove();
  REGIONS.forEach(function(rg){
    var orders=[]; S.route.forEach(function(id,idx){ if(id===rg.id) orders.push(idx+1); });
    var inRoute=orders.length>0, isStart=orders.indexOf(1)>=0;
    var el=document.createElement('div');
    el.className='mk'+(inRoute?' sel':'')+(isStart?' start':'')+(popFor===rg.id?' active':'');
    el.setAttribute('data-id', rg.id);

    var badge=inRoute?'<div class="mk-num">'+orders.join('·')+'</div>':'';
    el.innerHTML='<div class="dot"></div>'+badge+'<div class="mlabel">'+(S.lang==='ko'?rg.ko:rg.en)+'</div>';
    el.onclick=function(e){ e.stopPropagation(); openPop(rg); };
    mk.appendChild(el);
  });

/* draw the ordered route as a connected line with direction arrows */
function drawRoute(){
  var svg=document.getElementById('routeSvg'); if(!svg) return;
  var pts=[];
  S.route.forEach(function(id){ var r=regionById(id); if(r) pts.push([r.x*100, r.y*100]); });
  if(pts.length<2){ svg.innerHTML=''; return; }
  var poly=pts.map(function(p){ return p[0].toFixed(2)+','+p[1].toFixed(2); }).join(' ');
  var arrows='';
  for(var i=0;i<pts.length-1;i++){
    var a=pts[i], b=pts[i+1];
    var mx=(a[0]+b[0])/2, my=(a[1]+b[1])/2;
    var ang=Math.atan2(b[1]-a[1], b[0]-a[0]), s=2.6;
    var p1=(mx+Math.cos(ang)*s).toFixed(2)+','+(my+Math.sin(ang)*s).toFixed(2);
    var p2=(mx+Math.cos(ang+2.5)*s).toFixed(2)+','+(my+Math.sin(ang+2.5)*s).toFixed(2);
    var p3=(mx+Math.cos(ang-2.5)*s).toFixed(2)+','+(my+Math.sin(ang-2.5)*s).toFixed(2);
    arrows+='<polygon class="route-arrow" points="'+p1+' '+p2+' '+p3+'"/>';
  }
  svg.innerHTML='<polyline class="route-line-glow" points="'+poly+'"/>'+
                '<polyline class="route-line" points="'+poly+'"/>'+arrows;
}
/* commit a region to the route (from the popup button) — popup then closes */
function addStop(id){
  S.route.push(id);
  afterRoute();
  var rg=regionById(id), ko=S.lang==='ko', n=S.route.length, loop=(id===S.route[0] && n>1);
  if(n===1) say(ko?(rg.ko+'에서 출발! 전광판에 행선지를 이어서 추가해봐.'):('Departing from '+rg.en+'! Add more stops to the board.'));
  else if(loop) say(ko?(rg.ko+'(으)로 돌아오는 루트 완성! 멋진걸.'):('Looping back to '+rg.en+' — nice route!'));
  else say(ko?(rg.ko+' 행선지 추가! ('+n+'번째)'):(rg.en+' added! (stop '+n+')'));
}
/* remove a single stop from the board (✕ on a flap card) */
function removeStop(idx){
  if(idx<0||idx>=S.route.length) return;
  var removed=S.route.splice(idx,1)[0];
  afterRoute();
  var rr=regionById(removed), ko=S.lang==='ko';
  say(ko?((rr?rr.ko:'')+' 행선지를 뺐어.'):('Removed '+(rr?rr.en:'')+'.'));
}
function resetRoute(){

  S.route=[]; afterRoute(); hidePop();
  say(S.lang==='ko'?'전광판을 모두 비웠어. 출발지부터 다시 골라봐!':'Board cleared — pick a start again!');

/* render the departure board (전광판) */
function updateBoard(){
  var track=document.getElementById('depTrack'), cnt=document.getElementById('depCount');
  if(!track) return;
  var ko=S.lang==='ko', route=S.route;
  if(!route.length){
    track.innerHTML='<div class="dep-empty">'+(ko?'행선지가 비어 있어 · 지도에서 골라 추가':'Empty · tap the map to add')+'</div>';
    if(cnt) cnt.textContent='';

  }
  var html='';
  route.forEach(function(id,idx){
    var r=regionById(id); if(!r) return;

  track.querySelectorAll('.dep-x').forEach(function(x){

/* ===================== PLAN BUILDER ===================== */
var PLAN=null;
function activePOI(){
  var ids=(S.dests&&S.dests.length)?S.dests:['hakodate'];
  var pool=[];
  ids.forEach(function(rid){
    var arr=POI_BY_REGION[rid]; if(!arr) return;
    var rg=regionById(rid);
    arr.forEach(function(p){
      var c={}; for(var k in p) c[k]=p[k];
      c.region=rid; c.rko=rg?rg.ko:''; c.ren=rg?rg.en:'';
      pool.push(c);
    });
  });
  return pool;
}
function destName(){
  var ids=(S.dests&&S.dests.length)?S.dests:['hakodate'];
  if(ids.length===1){ var r=regionById(ids[0]); return r?(S.lang==='ko'?r.ko:r.en):(S.lang==='ko'?'홋카이도':'Hokkaido'); }
  return S.lang==='ko'?'홋카이도':'Hokkaido';
}
function destList(){
  var ids=(S.dests&&S.dests.length)?S.dests:['hakodate'];
  return ids.map(function(id){var r=regionById(id);return r?(S.lang==='ko'?r.ko:r.en):id;}).join(' · ');
}
function buildPlan(){
  var sv=S.survey;
  var nights=sv.nights, days=nights+1;
  var purposes=sv.purposes.slice();
  var perDay = sv.pace==='relaxed'?2:3;
  var POOL=activePOI();
  var ids=(S.dests&&S.dests.length)?S.dests:['hakodate'];
  var order={}; ids.forEach(function(r,i){ order[r]=i; });
  function score(p){ var s=0; p.cat.forEach(function(c){ if(purposes.indexOf(c)>=0) s+=3; }); if(p.winter) s+=1; return s; }
  /* cluster by selected-region order, then by relevance */
  var acts=POOL.filter(function(p){return !p.meal;}).slice().sort(function(a,b){
    var oa=order[a.region]||0, ob=order[b.region]||0; if(oa!==ob) return oa-ob; return score(b)-score(a);
  });
  var meals=POOL.filter(function(p){return p.meal;}).slice().sort(function(a,b){
    return (order[a.region]||0)-(order[b.region]||0);
  });
  var used={};
  function takeAct(slotPref){
    for(var i=0;i<acts.length;i++){ var p=acts[i]; if(used[p.id]) continue; if(p.slot===slotPref){used[p.id]=1;return p;} }
    for(var j=0;j<acts.length;j++){ var qq=acts[j]; if(!used[qq.id]){ used[qq.id]=1; return qq; } }
    return null;
  }
  function takeMeal(slot){
    var pool=meals.filter(function(m){return m.slot===slot && !used['meal_'+m.id];});
    if(!pool.length) pool=meals.filter(function(m){return m.slot===slot;});
    if(!pool.length) pool=meals;
    for(var i=0;i<pool.length;i++){ if(!used['meal_'+pool[i].id]){ used['meal_'+pool[i].id]=1; return pool[i]; } }
    return pool[0];
  }
  var dayPlans=[];
  for(var d=0;d<days;d++){
    var items=[];
    var first=(d===0), last=(d===days-1);
    items.push(slotItem('08:30', takeMeal('morning'), 'morning'));
    if(!first){ var am=takeAct('morning'); if(am) items.push(slotItem('10:30', am, am.slot)); }
    items.push(slotItem('12:30', takeMeal('lunch'), 'lunch'));
    var af=takeAct('after'); if(af) items.push(slotItem('14:30', af, af.slot));
    if(perDay>=3 && !last){ var af2=takeAct('after'); if(af2) items.push(slotItem('16:30', af2, af2.slot)); }
    if(!last){ var nightPick = takeAct('night'); if(nightPick) items.push(slotItem('18:30', nightPick, 'night')); }
    items.push(slotItem('20:00', takeMeal('dinner'), 'dinner'));
    dayPlans.push({day:d+1, first:first, last:last, items:items});
  }
  var total=0;
  dayPlans.forEach(function(dp){ dp.items.forEach(function(it){ total+=it.cost; }); });
  return { days:dayPlans, total:total, nights:nights };
}
function slotItem(time, poi){
  return { time:time, id:poi.id, icon:poi.icon, meal:!!poi.meal, cost:poi.cost,
    region:poi.region, rko:poi.rko, ren:poi.ren,
    ko:poi.ko, en:poi.en, areako:poi.areako, areaen:poi.areaen, dko:poi.dko, den:poi.den, tko:poi.tko, ten:poi.ten };
}

function monthLabel(){

function purposeLabels(){

          '<div class="tc-desc">'+(S.lang==='ko'?it.dko:it.den)+'</div>'+
          '<div class="tc-tip"><b>TIP </b>'+(S.lang==='ko'?it.tko:it.ten)+'</div>'+
          placeLinks(pn, S.lang==='ko'?it.rko:it.ren)+
        '</div></div>';
    });
    html+='</div></div>';
  });

  html+='<div class="plan-tipbox"><div class="pt-h">'+tr('tips_h')+'</div><ul>'+guideTips().map(function(t){return '<li>'+t+'</li>';}).join('')+'</ul></div>';

  html+='<div class="plan-foot">'+
    '<button class="btn gold" id="rerollBtn">'+tr('reroll')+'</button>'+
    '<button class="btn" id="baseFromPlan">'+tr('base_btn')+'</button>'+
    '<button class="btn ghost" id="restartBtn">'+tr('restart')+'</button>'+
  '</div>';

  w.innerHTML=html;

  document.querySelectorAll('#dayTabs .day-tab').forEach(function(tab){
    tab.onclick=function(){
      var d=this.getAttribute('data-d');
      document.querySelectorAll('#dayTabs .day-tab').forEach(function(x){x.classList.remove('on');});
      this.classList.add('on');
      document.querySelectorAll('.day-panel').forEach(function(p){ p.classList.toggle('on', p.getAttribute('data-dp')===d); });
    };
  });
  document.getElementById('rerollBtn').onclick=function(){ PLAN=buildPlan(); renderPlan(); saveState('plan'); say(S.lang==='ko'?'새로 짰어! 이건 어때?':'Fresh route! How about this one?'); document.getElementById('plan').scrollTop=0; };
  document.getElementById('restartBtn').onclick=function(){ resetAll(); show('title'); };
  document.getElementById('baseFromPlan').onclick=function(){ show('basecamp'); };
}
function chip(txt){ return txt?('<div class="chip">'+txt+'</div>'):''; }
function guideTips(){
  var sv=S.survey, tips=[];
  var ko=S.lang==='ko';
  if([12,1,2].indexOf(sv.month)>=0) tips.push(ko?'한겨울이라 영하 추위 + 눈길! 방수 부츠랑 핫팩은 필수야.':'Deep winter means sub-zero cold and snowy roads — bring waterproof boots and hand warmers.');
  else tips.push(ko?'초겨울/늦겨울이라 낮엔 견딜 만해도 밤은 쌀쌀해. 겉옷 단단히 챙겨.':'Early/late winter days are mild but nights bite — pack a solid coat.');
  if(sv.transit==='car') tips.push(ko?'렌터카는 겨울 타이어 옵션 꼭 확인하고, 눈길 운전은 천천히!':'For a rental car, confirm winter tires and drive slow on snow.');
  else tips.push(ko?'홋카이도는 도시 간 거리가 멀어. JR 패스나 시내 1일권을 잘 활용해.':'Hokkaido towns are far apart — use a JR pass or day tickets wisely.');
  if(S.dests&&S.dests.length>1) tips.push(ko?'여러 지역을 골랐네! 이동 시간이 기니 같은 권역끼리 묶어 동선을 짜는 게 좋아.':'You picked several regions — group nearby ones to cut long transfers.');
  if(sv.visited==='again') tips.push(ko?'재방문이니까 시레토코·왓카나이 같은 먼 지역이나 근교 온천도 노려봐.':'Been before? Aim for farther spots like Shiretoko or Wakkanai, or outer onsen.');
  else tips.push(ko?'처음이라면 삿포로·오타루처럼 접근성 좋은 곳부터 즐기고, 야경 명소는 일몰 직전을 노려.':'First time? Start with easy spots like Sapporo/Otaru, and catch night views right before sunset.');
  if(S.users.length>=4) tips.push(ko?'인원이 많으니 식당은 미리 예약해두면 마음 편해.':'Big group — reserve restaurants ahead to relax.');
  tips.push(ko?'야경은 일몰 직전 “매직아워”가 제일 예뻐. 시간 꼭 체크!':'Night views shine brightest in the “magic hour” right before sunset — check the time!');
  return tips;
}

/* ===================== CAMP (deco) ===================== */
var CAMP_ITEMS=[
  {id:'snowman',  src:'./Asset/el_snowman.png',  h:42, ko:'눈사람',  en:'Snowman'},
  {id:'tree1',    src:'./sprites/tree1.png',     h:58, ko:'침엽수',  en:'Pine'},
  {id:'tree2',    src:'./sprites/tree2.png',     h:54, ko:'눈나무',  en:'Snow tree'},
  {id:'igloo',    src:'./sprites/igloo.png',     h:40, ko:'이글루',  en:'Igloo'},
  {id:'cabin',    src:'./sprites/cabin.png',     h:50, ko:'통나무집', en:'Cabin'},
  {id:'cathedral',src:'./sprites/cathedral.png', h:66, ko:'성당',    en:'Chapel'},
  {id:'lantern',  src:'./sprites/lantern.png',   h:34, ko:'랜턴',    en:'Lantern'},
  {id:'bush',     src:'./sprites/bush.png',      h:22, ko:'덤불',    en:'Bush'},
  {id:'moon',     src:'./Asset/el_moon.png',     h:34, ko:'달',      en:'Moon'},
  {id:'cloud',    src:'./sprites/cloud.png',     h:24, ko:'구름',    en:'Cloud'},
  {id:'aurora',   src:'./Asset/el_aurora.png',   h:38, ko:'오로라',  en:'Aurora'}
];
function campItemById(id){ for(var i=0;i<CAMP_ITEMS.length;i++) if(CAMP_ITEMS[i].id===id) return CAMP_ITEMS[i]; return null; }
/* placement points on the snowfield — x/y are % of stage; y is where the item's base stands */
var CAMP_SLOTS=[
  {x:50,y:14},{x:19,y:19},{x:82,y:16},                 /* sky 0–2 */
  {x:13,y:57},{x:37,y:53},{x:63,y:55},{x:88,y:58},      /* back 3–6 */
  {x:26,y:86},{x:50,y:92},{x:75,y:85}                   /* front 7–9 */
];
var campActive=0;        /* member index, or 'all' */
var campSel=null;        /* selected palette item id, or 'eraser' */
var campReturn='title';

function enterCamp(){
  setDock();
  if(campSel==null) campSel=CAMP_ITEMS[0].id;
  if(campActive!=='all' && (typeof campActive!=='number' || campActive>=S.users.length)) campActive=0;
  if(S.npc) say(S.lang==='ko'?'다들 자기만의 눈밭을 가졌어! 소품을 골라서 마음껏 꾸며봐.':'Everyone gets their own snowfield! Pick props and decorate freely.');
  renderCamp();
}
function buildStage(deco){
  var st=document.createElement('div'); st.className='camp-stage';
  var stars='<div class="stars" style="height:55%">';
  for(var i=0;i<34;i++) stars+='<div class="star" style="left:'+(Math.random()*100).toFixed(1)+'%;top:'+(Math.random()*55).toFixed(1)+'%;animation-delay:'+(Math.random()*3).toFixed(1)+'s"></div>';
  stars+='</div>';
  st.innerHTML=stars+'<div class="cs-aurora"></div><div class="cs-ground"></div>';
  return st;
}
function fillSlots(st, deco, interactive, mi){
  CAMP_SLOTS.forEach(function(s,idx){
    var itemId=deco?deco[idx]:null;
    if(!interactive && !itemId) return;   /* showcase view: only placed props */
    var slot=document.createElement('div'); slot.className='cs-slot';
    slot.setAttribute('data-idx',idx);
    slot.style.left=s.x+'%'; slot.style.top=s.y+'%'; slot.style.zIndex=Math.round(s.y);
    paintSlot(slot, itemId);
    if(interactive) slot.onclick=function(){ placeAt(mi, idx); };
    st.appendChild(slot);
  });
}
function paintSlot(slot, itemId){
  var it=itemId?campItemById(itemId):null;
  if(it){ slot.classList.add('filled');
    slot.innerHTML='<img class="spr" src="'+it.src+'" style="height:'+it.h+'px;width:auto">';
  } else { slot.classList.remove('filled'); slot.innerHTML='<div class="ph">+</div>'; }
}
function placeAt(mi, si){
  var u=S.users[mi]; if(!u) return;
  if(!u.deco) u.deco={};
  if(campSel==='eraser'){
    if(u.deco[si]==null) return;
    delete u.deco[si]; campComment(u.name, null, 'clear');
  } else {
    u.deco[si]=campSel; campComment(u.name, campItemById(campSel), 'place');
  }
  var slot=document.querySelector('#campMain .cs-slot[data-idx="'+si+'"]');
  if(slot) paintSlot(slot, u.deco[si]);
  saveState('camp');
}
function campComment(name, item, action){
  if(!S.npc) return;
  var ko=S.lang==='ko';
  var line;
  if(action==='clear'){
    line=ko? name+'의 자리에서 하나 치웠어. 다시 꾸며보자!' : 'Cleared a spot in '+name+'’s camp. Let’s redo it!';
  } else {
    var t=item?(ko?item.ko:item.en):'';
    var pool=ko?[
      name+'의 눈밭에 '+t+'! 분위기 산다.',
      t+', 좋은 선택이야. '+name+'(이)랑 잘 어울려.',
      '오, '+t+'(을)를 여기에? '+name+' 센스 있네!',
      name+'의 캠프가 점점 예뻐지는걸?'
    ]:[
      name+'’s snowfield gets a '+t+'! Nice.',
      'Good pick — '+t+' suits '+name+'.',
      'Ooh, a '+t+' right there? '+name+' has taste!',
      name+'’s camp keeps getting prettier!'
    ];
    line=pool[Math.floor(Math.random()*pool.length)];
  }
  say(line);
}
function renderCamp(){
  var tabs=document.getElementById('campTabs'); tabs.innerHTML='';
  S.users.forEach(function(u,i){
    var t=document.createElement('div'); t.className='camp-tab'+(campActive===i?' on':'');
    t.textContent=u.name+(i===0?' ♛':'');
    t.onclick=function(){ campActive=i; renderCamp(); };
    tabs.appendChild(t);
  });
  var all=document.createElement('div'); all.className='camp-tab all'+(campActive==='all'?' on':'');
  all.textContent=(S.lang==='ko'?'다같이':'All');
  all.onclick=function(){ campActive='all'; renderCamp(); };
  tabs.appendChild(all);

  var main=document.getElementById('campMain'); main.innerHTML='';
  if(campActive==='all') renderCampAll(main);
  else renderCampEdit(main, campActive);
}
function renderCampEdit(main, mi){
  var u=S.users[mi]; if(!u){ main.textContent=''; return; }
  if(!u.deco) u.deco={};
  var wrap=document.createElement('div'); wrap.className='stage-wrap';
  var st=buildStage(u.deco); fillSlots(st, u.deco, true, mi);
  wrap.appendChild(st); main.appendChild(wrap);

  var box=document.createElement('div'); box.className='items-panel';
  var ititle=document.createElement('div'); ititle.className='items-title';
  ititle.textContent=S.lang==='ko'?'소품':'ITEMS';
  box.appendChild(ititle);
  var pal=document.createElement('div'); pal.className='camp-palette';
  CAMP_ITEMS.forEach(function(it){
    var p=document.createElement('div'); p.className='pal-item'+(campSel===it.id?' sel':'');
    p.innerHTML='<img class="spr" src="'+it.src+'"><div class="pl-name">'+(S.lang==='ko'?it.ko:it.en)+'</div>';
    p.onclick=function(){ campSel=it.id; renderCamp(); };
    pal.appendChild(p);
  });
  var er=document.createElement('div'); er.className='pal-item eraser'+(campSel==='eraser'?' sel':'');
  er.innerHTML='✕<div class="pl-name">'+(S.lang==='ko'?'지우개':'Erase')+'</div>';
  er.onclick=function(){ campSel='eraser'; renderCamp(); };
  pal.appendChild(er);
  box.appendChild(pal);
  main.appendChild(box);

  var hint=document.createElement('div'); hint.className='camp-hint';
  hint.textContent=S.lang==='ko'?'소품을 고른 뒤 눈밭의 빈 자리(＋)를 눌러 놓아봐. 지우개로 치울 수 있어.':'Pick a prop, then tap an empty spot (＋). Use the eraser to remove.';
  main.appendChild(hint);
  fitStage(wrap, 1);
}
function renderCampAll(main){
  var grid=document.createElement('div'); grid.className='camp-all';
  S.users.forEach(function(u,i){
    var card=document.createElement('div'); card.className='camp-card';
    var mw=document.createElement('div'); mw.className='mini-wrap';
    var st=buildStage(u.deco||{}); fillSlots(st, u.deco||{}, false, i);
    st.style.pointerEvents='none'; mw.appendChild(st); card.appendChild(mw);
    var nm=document.createElement('div'); nm.className='cc-name';
    nm.innerHTML=u.name+(i===0?'<span class="lead">'+(S.lang==='ko'?'대장':'LEAD')+'</span>':'');
    card.appendChild(nm);
    card.onclick=function(){ campActive=i; renderCamp(); };
    grid.appendChild(card);
    fitStage(mw, 0.48);
  });
  main.appendChild(grid);
  var hint=document.createElement('div'); hint.className='camp-hint';
  hint.textContent=S.lang==='ko'?'카드를 누르면 그 친구의 눈밭을 꾸밀 수 있어.':'Tap a card to decorate that friend’s snowfield.';
  main.appendChild(hint);
}
function fitStage(wrap, maxScale){
  var st=wrap.querySelector('.camp-stage'); if(!st) return;
  var scale=maxScale;
  if(maxScale>=1){
    var cw=document.getElementById('campMain').clientWidth;
    if(!cw||cw<40) cw=360;
    var avail=Math.min(420, cw);
    scale=Math.min(1,(avail-6)/360);
  }
  st.style.transform='scale('+scale+')';
  wrap.style.width=(360*scale)+'px';
  wrap.style.height=(260*scale)+'px';
}
window.addEventListener('resize',function(){ if(current==='camp' && campActive!=='all'){ var w=document.querySelector('#campMain .stage-wrap'); if(w) fitStage(w,1); } });

/* ===================== BASE CAMP (hub) ===================== */
function enterBasecamp(){
  setDock();
  if(S.npc) say(S.lang==='ko'?'베이스캠프야! 대원들이랑 여행 작전을 한눈에 볼 수 있어.':'Base camp! Your crew and trip plan at a glance.');
  renderBasecamp();
}
function renderBasecamp(){
  var w=document.getElementById('baseWrap'); w.innerHTML='';
  var ko=S.lang==='ko';

  /* framed scenery banner — pure ambience */
  var hero=document.createElement('div'); hero.className='bc-hero';
  hero.innerHTML='<img src="./Examples/1.gif" alt="">'+
    '<div class="bc-plate">'+(ko?'❄ 눈길원정대 베이스캠프':'❄ SNOW QUEST BASE CAMP')+'</div>';
  w.appendChild(hero);

  /* guide + destinations */
  if(S.npc){
    var g=npcById(S.npc);
    var gd=document.createElement('div'); gd.className='bc-guide';
    var chips=(S.dests&&S.dests.length)
      ? S.dests.map(function(id){var r=regionById(id);return '<div class="chip">'+(r?(ko?r.ko:r.en):id)+'</div>';}).join('')
      : '<div class="chip">'+(ko?'목적지 미정':'TBD')+'</div>';
    gd.innerHTML=
      '<div class="bc-portrait"><img class="spr" src="'+SPR+g.img+'" style="height:'+Math.min(g.gh||60,62)+'px;width:auto"></div>'+
      '<div class="bc-gtext"><div class="bc-gname">'+L(g.name)+'</div><div class="bc-grole">'+L(g.role)+'</div>'+
      '<div class="bc-dests">'+chips+'</div></div>';
    w.appendChild(gd);
  }

  /* trip briefing (survey summary) */
  var sec1=document.createElement('div'); sec1.className='bc-sec'; sec1.innerHTML=tr('base_op'); w.appendChild(sec1);
  var op=document.createElement('div'); op.className='bc-op';
  var sv=S.survey, bits=[];
  bits.push(chip(relationLabel()));
  bits.push(chip(S.users.length+(ko?'명':' ppl')));
  if(sv.month) bits.push(chip(monthLabel()));
  if(sv.purposes&&sv.purposes.length) bits.push(chip(purposeLabels()));
  bits.push(chip(sv.nights+(ko?'박 '+(sv.nights+1)+'일':'N/'+(sv.nights+1)+'D')));
  if(sv.transit) bits.push(chip(sv.transit==='car'?(ko?'렌터카':'Car'):(ko?'뚜벅이':'Transit')));
  if(sv.pace) bits.push(chip(sv.pace==='relaxed'?(ko?'느긋':'Relaxed'):(ko?'알차게':'Packed')));
  if(sv.visited) bits.push(chip(sv.visited==='again'?(ko?'재방문':'Return'):(ko?'첫방문':'First')));
  bits.push(chip('¥'+(sv.budget||0).toLocaleString()+(ko?' /1인':' /pp')));
  op.innerHTML=bits.join('');
  w.appendChild(op);

  /* crew roster */
  var sec2=document.createElement('div'); sec2.className='bc-sec';
  sec2.innerHTML=tr('base_roster')+' <b>'+S.users.length+'</b>';
  w.appendChild(sec2);
  var roster=document.createElement('div'); roster.className='bc-roster';
  S.users.forEach(function(u,idx){
    if(!u.deco) u.deco={};
    var card=document.createElement('div'); card.className='bc-member';
    var top=document.createElement('div'); top.className='bc-m-top';
    top.innerHTML='<div class="bc-m-ava"><img class="spr" src="./Asset/el_snowman.png"></div>'+
      '<div class="bc-m-name">'+u.name+'</div>'+
      (idx===0?'<div class="bc-m-lead">'+(ko?'대장':'LEAD')+'</div>':'');
    card.appendChild(top);
    var mini=document.createElement('div'); mini.className='bc-m-mini';
    var st=buildStage(u.deco); fillSlots(st, u.deco, false, idx); st.style.pointerEvents='none';
    mini.appendChild(st); card.appendChild(mini);
    var cmt=document.createElement('input'); cmt.className='bc-comment'; cmt.maxLength=40;
    cmt.placeholder=tr('base_cmt_ph'); cmt.value=u.comment||'';
    cmt.oninput=function(){ u.comment=this.value; saveState('basecamp'); };
    card.appendChild(cmt);
    var deco=document.createElement('button'); deco.className='bc-m-deco'; deco.textContent='✎ '+tr('base_deco');
    deco.onclick=function(){ campReturn='basecamp'; campActive=idx; show('camp'); };
    card.appendChild(deco);
    roster.appendChild(card);
    fitStage(mini, 0.42);
  });
  w.appendChild(roster);

  /* footer actions */
  var foot=document.createElement('div'); foot.className='bc-foot';
  var resume=document.createElement('button'); resume.className='btn gold'; resume.textContent=tr('base_resume');
  resume.onclick=goResume;
  foot.appendChild(resume);
  if(PLAN){
    var pv=document.createElement('button'); pv.className='btn'; pv.textContent=tr('base_plan');
    pv.onclick=function(){ show('plan'); };
    foot.appendChild(pv);
  }
  var rs=document.createElement('button'); rs.className='btn ghost'; rs.textContent=tr('restart');
  rs.onclick=function(){ resetAll(); show('title'); };
  foot.appendChild(rs);
  w.appendChild(foot);
}
function goResume(){
  var s=loadSave();
  var t=(s&&s.flow)?s.flow:'guide';
  if(t==='plan'&&!PLAN) t='survey';
  show(t);
}

/* ===================== RESET ===================== */
function resetAll(){
  S.npc=null; S.users=[]; S.dest='hakodate'; S.dests=[]; S.route=[];
  S.survey={ relation:null, purposes:[], budget:40000, visited:null, nights:2, month:null, transit:null, pace:null };
  document.getElementById('guideNext').disabled=true;
  buildGuides();
  document.getElementById('dock').classList.remove('show');
}

/* ===================== LANGUAGE ===================== */
function applyLang(){
  document.documentElement.lang=S.lang;
  document.querySelectorAll('[data-t]').forEach(function(el){ el.innerHTML=tr(el.getAttribute('data-t')); });
  document.querySelectorAll('[data-ph]').forEach(function(el){ el.setAttribute('placeholder', tr(el.getAttribute('data-ph'))); });
  buildGuides();
  if(S.npc) setDock();
  if(current==='party') renderUsers();
  if(current==='survey') renderSurvey();
  if(current==='map'){ mapBuilt=false; enterMap(); }
  if(current==='plan') renderPlan();
  if(current==='camp') renderCamp();
  if(current==='basecamp') renderBasecamp();
}

/* ===================== START ===================== */
document.getElementById('startBtn').onclick=function(){ resetAll(); show('guide'); };
document.getElementById('baseBtn').onclick=function(){
  var s=loadSave();
  if(s){
    S.lang=s.lang||S.lang; S.npc=s.npc||S.npc; S.users=s.users||[]; S.dest=s.dest||S.dest; S.dests=s.dests||[];
    S.route=s.route||[]; if((!S.route.length)&&S.dests.length) S.route=S.dests.slice(); syncDests();
    if(s.survey) S.survey=s.survey; PLAN=s.plan||PLAN;
    buildGuides(); document.getElementById('guideNext').disabled=!S.npc; if(S.npc) setDock();
  }
  if(!S.users.length){ resetAll(); show('guide'); return; }
  show('basecamp');
};
document.addEventListener('keydown',function(e){ if((e.key==='Enter'||e.key===' ')&&current==='title'){ resetAll(); show('guide'); } });

/* init */
buildGuides();
applyLang();
refreshTitle();
document.getElementById('title').classList.add('shown');
</script>
